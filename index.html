<!doctype html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survey Form</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header></header>
    <main class="main">
      <div class="form-container">
        <form class="form-body">
          <label class="form-label"
            ><p class="poppins-regular">Name</p>
            <input
              class="input-form"
              type="text"
              placeholder="Enter your name"
              required
            />
          </label>

          <label class="form-label"
            ><p class="poppins-regular">Email</p>

            <input
              class="input-form"
              type="email"
              placeholder="Enter your Email"
              required
            />
          </label>

          <label class="form-label"
            ><p class="poppins-regular">Age (optional)</p>
            <input class="input-form" type="number" placeholder="Age" />
          </label>

          <label class="form-label"
            ><p class="poppins-regular">
              Which option best describes your current role?
            </p>
            <select>
              <option>Select current role</option>
              <option>Student</option>
              <option>Full Time Job</option>
              <option>Full Time Learner</option>
              <option>Prefer not to say</option>
            </select>
          </label>

          <label class="form-label"
            ><p class="poppins-regular">
              Would you recommend freeCodeCamp to a friend?
            </p>
            <div class="radio-group poppins-regular">
              <label>
                <input type="radio" name="recommend" /> Definitely
              </label>

              <label> <input type="radio" name="recommend" /> Maybe </label>

              <label> <input type="radio" name="recommend" /> Not sure </label>
            </div>
          </label>

          <label class="form-label"
            ><p class="poppins-regular">What is your favorite feature?</p>
            <select>
              <option>Select an option</option>
              <option>Challenges</option>
              <option>Projects</option>
              <option>Community</option>
              <option>Open Source</option>
            </select>
          </label>

          <label class="form-label"
            ><p class="poppins-regular">What would you like to see improved?</p>
            <div class="checkbox-group poppins-regular">
              <label>
                <input
                  type="checkbox"
                  name="improve"
                  value="frontend-projects"
                />
                Front-end Projects
              </label>

              <label>
                <input
                  type="checkbox"
                  name="improve"
                  value="backend-projects"
                />
                Back-end Projects
              </label>

              <label>
                <input
                  type="checkbox"
                  name="improve"
                  value="data-visualization"
                />
                Data Visualization
              </label>

              <label>
                <input type="checkbox" name="improve" value="challenges" />
                Challenges
              </label>

              <label>
                <input
                  type="checkbox"
                  name="improve"
                  value="open-source-community"
                />
                Open Source Community
              </label>

              <label>
                <input
                  type="checkbox"
                  name="improve"
                  value="gitter-help-rooms"
                />
                Gitter help rooms
              </label>

              <label>
                <input type="checkbox" name="improve" value="videos" />
                Videos
              </label>

              <label>
                <input type="checkbox" name="improve" value="city-meetups" />
                City Meetups
              </label>

              <label>
                <input type="checkbox" name="improve" value="wiki" />
                Wiki
              </label>

              <label>
                <input type="checkbox" name="improve" value="forum" />
                Forum
              </label>

              <label>
                <input
                  type="checkbox"
                  name="improve"
                  value="additional-courses"
                />
                Additional Courses
              </label>
            </div>
          </label>

          <label class="form-label"
            ><p class="poppins-regular">Any comments or suggestions?</p>

            <textarea placeholder="Enter your comment here..."></textarea>
          </label>

          <div class="btn-div">
            <button type="submit">Submit</button>
            <button class="btn-reset" type="reset">Reset</button>
          </div>
        </form>
      </div>
    </main>
    <footer></footer>
  </body>
</html>
